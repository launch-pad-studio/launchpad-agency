<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launch Pad — בעבודה</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Heebo:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #0a0a0a;
      color: #fafafa;
      font-family: 'Heebo', system-ui, -apple-system, sans-serif;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(800px circle at 20% 0%, rgba(255,255,255,0.04), transparent 40%),
        radial-gradient(600px circle at 80% 100%, rgba(255,255,255,0.03), transparent 40%);
      pointer-events: none;
    }
    .wrap {
      position: relative;
      text-align: center;
      max-width: 520px;
    }
    .mark {
      display: inline-block;
      margin-bottom: 48px;
      opacity: 0.95;
    }
    .mark span {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.15em;
      color: #fafafa;
      text-transform: uppercase;
    }
    .mark::before {
      content: '◉';
      margin-inline-end: 10px;
      color: #fafafa;
      font-size: 14px;
    }
    .code {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: clamp(80px, 18vw, 160px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.04em;
      color: #fafafa;
      margin-bottom: 32px;
    }
    .title {
      font-size: clamp(20px, 4vw, 26px);
      font-weight: 400;
      color: #fafafa;
      margin-bottom: 12px;
    }
    .sub {
      font-size: 15px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .meta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 10px 18px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 12px;
      color: #999;
      letter-spacing: 0.05em;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f59e0b;
      box-shadow: 0 0 8px rgba(245, 158, 11, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="mark"><span>Launch Pad</span></div>
    <div class="code">404</div>
    <h1 class="title">האתר בעבודה</h1>
    <p class="sub">חוזרים בקרוב עם משהו חדש.</p>
    <div class="meta"><span class="dot"></span><span>UNDER CONSTRUCTION</span></div>
  </div>
</body>
</html>
